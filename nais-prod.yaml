apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: delta-frontend
  namespace: delta
  labels:
    team: delta
spec:
  image: {{image}}
  ingresses:
    - https://delta.nav.no
    - https://fagtorsdag.ansatt.nav.no
  port: 3000
  resources:
    limits:
      cpu: 200m
    requests:
      cpu: 200m
  azure:
    application:
      enabled: true
      tenant: nav.no
      allowAllUsers: true
    sidecar:
      enabled: true
      autoLogin: true
  accessPolicy:
    outbound:
      rules:
        - application: delta-backend
  env:
    - name: NEXT_PUBLIC_CLUSTER
      value: prod
    - name: NEXT_PUBLIC_HOSTNAME
      value: https://delta.nav.no
    - name: NEXT_TELEMETRY_DISABLED
      value: "1"
    - name: FAGGRUPPE_ADMIN_GROUP_ID
      value: "74eafa90-c494-4913-9b96-76da786c8419"
  liveness:
    path: /internal/is-alive
    initialDelay: 10
    timeout: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/is-ready
    initialDelay: 10
    periodSeconds: 5
    timeout: 5
  replicas:
    min: 1
    max: 4
    cpuThresholdPercentage: 80
